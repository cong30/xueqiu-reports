<style>/* ===== 全局 ===== */

/* ===== 统计细分卡片 ===== */
.stat-detail {
    display: grid; grid-template-columns: 1fr 1fr;

.stat-box {
    background: #f8f9fa;
    border-radius: 8px; padding: 12px 14px;

.stat-box .stat-val {

}

}

.section-title {
    display: flex; align-items: center;
    margin: 25px 0 15px; font-size: 17px; font-weight: 700;
    color: #1a1a1a;
}
.section-title .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background-color: #07c160; margin-right: 8px;
    flex-shrink: 0;
}
.section-count {
    font-size: 12px; color: #999; font-weight: 400;
    margin-left: 8px;
}

/* ===== 帖子卡片 ===== */
.post-card {
    background: #fff;
    border: 1px solid #eee;
    border-radius: 8px;
    padding: 15px 16px;
    margin-bottom: 12px;
    position: relative;
    transition: box-shadow 0.2s;
}
.post-card:hover {
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
}

/* 帖子类型标签 */
.post-type-tag {
    display: inline-block;
    font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 3px;
    margin-right: 6px; vertical-align: middle;
}
.tag-post {
    background-color: #07c160; color: #fff;
}
.tag-reply {
    background-color: #f0f0f0; color: #666;
}
.tag-column {
    background-color: #1890ff; color: #fff;
}

/* 时间标签 */
.time-tag {
    display: inline-block;
    font-size: 12px; color: #07c160;
    font-weight: 600;
    font-variant-numeric: tabular-nums;
    margin-right: 6px; vertical-align: middle;
}

/* 回复对象 */
.reply-to {
    font-size: 12px; color: #576b95;
    font-weight: 500; margin-right: 6px;
}

/* 帖子正文 */
.post-text {
    font-size: 15px; line-height: 1.75;
    color: #333; margin: 10px 0 0;
    word-break: break-word;
}

/* ===== 回帖卡片 ===== */
.reply-card {
    background: #fafafa;
    border: 1px solid #f0f0f0;
    border-radius: 8px;
    padding: 12px 14px;
    margin-bottom: 10px;
    border-left: 3px solid #07c160;
}
.reply-card .post-text {
    font-size: 14px; color: #555;
}

/* ===== 分类摘要卡片 ===== */
.category-card {
    background: #f8f9fa;
    border-radius: 8px;

    margin-bottom: 10px;
}

    font-size: 15px; font-weight: 700;

}

}
.cat-tag {

    font-size: 11px; color: #07c160;
    text-decoration: none;
    margin-top: 6px;
    padding: 2px 6px;
    border: 1px solid #07c160;
    border-radius: 4px;
    transition: all 0.2s;
}
.post-link:hover {
    background: #07c160; color: #fff;
}

/* ===== 分隔线 ===== */
.divider {
    height: 1px;
    background: linear-gradient(to right, transparent, #07c160, transparent);
    margin: 25px 0;
    border: none;
